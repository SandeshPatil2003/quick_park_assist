<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Parking Spot Booking</title>
    <link rel="icon" href="@{/favicon.ico}" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
            integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
            crossorigin="anonymous"
    />
    <link th:href="@{/css/homeStyle.css}" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/spotbooking/style.css}">
</head>

<body th:class="@{hero-area}">
<div th:class="@{bg-box}">
    <img th:src="@{/images/slider-bg.jpg}" alt="Background Image" />
</div>
<header th:class="@{header_section}">

    <div th:class="@{container-fluid}">
<!--        <h1 th:class="@{logo}">SMART PARKING SPOTS</h1>-->
        <nav th:class="@{navbar navbar-expand-lg custom_nav-container}">
            <a class="navbar-brand" href="/" th:href="@{/}">
            <span>
              Quick Park Assist
            </span>
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class=""> </span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul th:class="@{navbar-nav}">
                <li th:class="@{nav-item}"><a th:href="@{/}" th:class="@{nav-link}">HOME</a></li>
                <li class="nav-item"
                    th:classappend="${#request.requestURI == '/registration'} ? 'active'">
                    <a class="nav-link"
                       th:href="@{/registration}">
                        <span sec:authorize="isAnonymous()">Registration</span>
                        <span sec:authorize="isAuthenticated()">Add Vehicle</span>

                    </a>
                </li>
<!--                <li th:class="@{nav-item}"><a th:href="@{/registration}" th:class="@{nav-link}">REGISTRATION</a></li>-->
                <li class="nav-item" th:if="${user != null and user.role == 'SPOT_OWNER'}"
                    th:classappend="${#request.requestURI == '/spot-management'} ? 'active'">
                    <a class="nav-link" th:href="@{/spot-management}">Smart spots</a>
                </li>
                <li th:class="@{nav-item}"><a th:href="@{/booking}" th:class="@{active nav-link}">BOOKING</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/addAddonServices}" th:class="@{nav-link}">ADDON SERVICES</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/reservations}" th:class="@{nav-link}">EV CHARGING</a></li>
            </ul>
                <!-- Authentication Section -->
                <ul class="navbar-nav ms-auto">
                    <li th:if="${#authentication.authenticated}" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa fa-user"></i> <span th:text="${#authentication.name}">User</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" th:href="@{/logout}">Logout</a>
                        </div>
                    </li>
                    <li th:if="${!#authentication.authenticated}" class="nav-item">
                        <a class="nav-link" th:href="@{/login}"><i class="fa fa-sign-in"></i> Login</a>
                    </li>
                </ul>
            <form class="form-inline">
                <button class="btn my-2 my-sm-0 nav_search-btn" type="submit">
                    <i class="fa fa-search" aria-hidden="true"></i>
                </button>
            </form>
            </div>
        </nav>
    </div>
</header>
<!-- End header section -->
<script>
    function updateProfile() {
      // Redirect to the profile update page
      window.location.href = '/updateProfile';
  }

  function confirmLogout() {
      // Show the logout confirmation modal
      $('#logoutConfirmationModal').modal('show');
  }

</script>
<main th:class="@{main}" style="margin-top: 100px;">
    <div th:class="@{grid-container}">
        <!-- Sidebar (Aside) -->
        <aside th:class="@{aside col-md-3 bg-dark p-5}">
            <h2>Book a Spot</h2>
            <ul th:class="@{nav flex-column}">
                <li th:class="@{nav-item}"><a th:href="@{/book}" th:class="@{active nav-link text-light}">Book Now</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/modify-Booking-Details}" th:class="@{nav-link text-light}">Modify Booking Details</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/view-Booking-Details}" th:class="@{nav-link text-light}">View Booking</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/viewBookingByNumber}" th:class="@{nav-link text-light}">View Bookings by Mobile Number</a></li>
                <li th:class="@{nav-item}"><a th:href="@{/viewBookingToCancel}" th:class="@{nav-link text-light}">Cancel a Booking</a></li>
            </ul>
        </aside>

        <!-- Form Container -->
        <div  th:class="@{booking-form-container}">
            <form th:action="@{/book}" METHOD="post" th:class="@{booking-form}">
                <h1>Book your Parking Spot</h1>

                <!-- Show confirmation message -->
                <div th:if="${confirmationMessage}" th:class="@{alert alert-success}">
                    <p th:text="${confirmationMessage}"></p>
                </div>
                <!-- Show error message -->
                <div th:if="${errorMessage}" th:class="@{alert alert-danger}">
                    <p th:text="${errorMessage}"></p>
                </div>

                <div th:class="@{form-group}">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" required />
                </div>
                <div th:class="@{form-group}">
                    <label for="mobileNumber">Mobile Number</label>
                    <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="Enter mobile number" required />
                </div>

                <div th:class="@{form-group}">
                    <label for="parkingSpotId">Select Parking Spot</label>
                    <!--                    <select id="parkingSpot" name="parkingSpot">-->
                    <!--                        <option value="PS1">Spot Id: PS1 - Downtown, 5th Avenue (indoor)</option>-->
                    <!--                        <option value="PS2">Spot Id: PS2 - Central Park, 8th Avenue (outdoor)</option>-->
                    <!--                        <option value="PS2">Spot Id: PS3 - Airport Terminal, West Wing (indoor)</option>-->
                    <!--                        <option value="PS3">Spot Id: PS4 - Mall Parking, Main Street (covered)</option>-->
                    <!--                        <option value="PS4">Spot Id: PS5 - Hospital Parking, Elm Street (outdoor)</option>-->
                    <!--                    </select>-->

                    <select id="parkingSpotId" name="parkingSpotId" required>
                        <option value="" disabled selected>Select a parking spot</option>
                        <th:block th:each="spot : ${parkingSpots}">
                            <option th:value="${spot.spotId}" th:text="'Spot Id: ' + ${spot.spotId} + ' - ' + ${spot.location}"
                                    th:data-price="${spot.pricePerHour}"></option>
                        </th:block>
                    </select>
                </div>
                <div th:class="@{form-group}">
                    <label for="vehicleId">Select Vehicle</label>
                    <select id="vehicleId" name="vehicleId" required>
                        <option value="" disabled selected>Select a vehicle</option>
                        <th:block th:each="vehicle : ${vehicles}">
                            <option th:value="${vehicle.id}" th:text="${vehicle.vehicleModel} + ' - ' + ${vehicle.vehicleNumber}"></option>
                        </th:block>
                    </select>

                    <!--                    <label for="vehicleInfo">Select Your Vehicle</label>-->
<!--                    <select id="vehicleInfo" name="vehicleInfo" required>-->
<!--                        <option value="" disabled selected>Select your vehicle</option>-->
<!--                        <th:block th:each="vehicle : ${vehicles}">-->
<!--                            <option th:value="${vehicle.vehicleModel} + ' - ' + ${vehicle.vehicleNumber}"-->
<!--                                    th:text="${vehicle.vehicleModel} + ' - ' + ${vehicle.vehicleNumber}">-->
<!--                            </option>-->
<!--                        </th:block>-->
<!--                        </th:block>-->
<!--                    </select>-->

                </div>

                <!--                <div class="form-group">-->
                <!--                    <label for="duration">Select Duration (Hours)</label>-->
                <!--                    <select id="duration" name="duration">-->
                <!--                        <option>1 Hour</option>-->
                <!--                        <option>2 Hours</option>-->
                <!--                        <option>3 Hours</option>-->
                <!--                    </select>-->
                <!--                </div>-->
                <div th:class="@{form-group}">
                    <label for="duration">Enter Duration (Hours)</label>
                    <input type="number" id="duration" name="duration" min="1" max="24" step="1" placeholder="Enter duration in hours" required onchange="updatePrice()">
                </div>


                <div th:class="@{form-group}">
                    <label for="startTime">Select Start Time</label>
                    <input type="datetime-local" id="startTime" name="startTime" />
                </div>

                <div th:class="@{form-group}">
                    <label for="price">Estimated Price</label>
                    <input type="text" id="price" name="price" value="100.00" readonly />
                </div>

                <div th:class="@{form-group}">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" name="paymentMethod">
                        <option>Pay on Spot</option>
                        <option>Online Payment</option>
                    </select>
                </div>

                <button type="submit" class="button" >Confirm Booking</button>
            </form>
        </div>
    </div>


</main>


<script th:src="@{/js/script.js}" ></script>
<script>
    function toggleForm(formId) {
// Hide all forms
const forms = document.querySelectorAll("form");
forms.forEach((form) => (form.style.display = "none"));

// Show the selected form
const selectedForm = document.getElementById(formId);
if (selectedForm) {
  selectedForm.style.display = "block";
}
}

</script>

<!-- Bootstrap 5 Bundle (Includes Popper.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Owl Carousel (if needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

<!-- Nice Select (if needed) -->
<script th:src="@{js/jquery.nice-select.min.js}"></script>

<!-- Custom JS -->
<script th:src="@{js/custom.js}"></script>

</body>
</html>
</body>
</html>
