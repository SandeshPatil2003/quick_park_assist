<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Addon Service Duration</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Modify Addon Service Duration</h2>

        <div th:if="${error}" class="text-red-500 text-center mb-4">
            <p th:text="${error}"></p>
        </div>

        <div th:if="${service}">
            <form action="/updateAddonServiceDuration" method="post" class="space-y-4">
                <input type="hidden" name="serviceID" th:value="${service.serviceID}">

                <div>
                    <label class="block text-gray-700 font-bold mb-2">Service Name:</label>
                    <p class="text-gray-900 font-semibold" th:text="${service.name}"></p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">Current Duration:</label>
                    <p class="text-gray-900 font-semibold" th:text="${service.duration}"></p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2" for="newDuration">New Duration (in hours):</label>
                    <input type="number" step="0.1" id="newDuration" name="newDuration" required
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit"
                        class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                    Update Duration
                </button>
            </form>
        </div>

        <div class="mt-4 text-center">
            <a href="/modifySelectedAddonServices" class="text-blue-500 hover:underline">Back to Services</a>
        </div>
    </div>
</body>
</html>
